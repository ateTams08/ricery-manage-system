<!DOCTYPE html>
<html>
<head>
    <!--CSS LINK-->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <!-- LOGO AND HEADER -->
    <div class="logo-container">
        <img src="../../assets/logo1.png" alt="Logo" style="width:120px;height:100px;">
        <h2>Database System</h2>
    </div>

    <!-- TOP NAVIGATION -->
    <div class="topnav">
        <a href="../index.html">Home</a>
        <a id="productID" href="product.html">Product Inventory</a>
        <a id="prodempID" href="product-employee.html">Assignments</a>
        <a id="transactionID" href="transaction.html">Transactions</a>
        <a id="customerID" href="customer.html">Customer</a>
        <a id="empID" href="employee.html">Employee</a>
        <a class="active" id="suppID" href="supplier.html">Supplier</a>
        <a href="../login.html" id="logoutButton" style="float: right;">Log Out</a>
    </div>

    <!-- ROLE RESTRICTION SCRIPT -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userRole = localStorage.getItem('userRole');

            if (userRole === 'admin') {
                empID.style.display = 'block';
            } else if (userRole === 'employee') {
                empID.style.display = 'none';
                prodempID.style.display = 'none';
                suppID.style.display = 'none';
            } else {
                alert('Session expired or unauthorized access. Please log in.');
                window.location.href = 'login.html';
                return;
            }
        });
    </script>

    <br>

    <!-- SUPPLIER MODULE FORM -->
    <h4>Supplier</h4>
    <fieldset>
        <form action="/Ricery/backend/modules/supplier.php" method="POST">
            <label for="supp_id">Supplier ID:</label>
            <input type="text" name="supp_id" minlength="5" maxlength="5"
                   pattern="[0-9]{5}"
                   title="Supplier ID must be exactly 5 digits (00001 - 99999).">
            <br>

            <label for="emp_id">*Employee ID (in charge):</label>
            <input type="text" name="emp_id" minlength="3" maxlength="3"
                   pattern="E0[1-9]|E10"
                   title="Employee ID must be from E01 to E10.">
            <br>

            <label for="supp_name">Supplier Name:</label>
            <input type="text" name="supp_name" maxlength="50" pattern="[A-Za-z\s]+" title="Only letters and spaces"><br>

            <label for="supp_contactn">Contact Number:</label>
            <input type="text" name="supp_contactn" minlength="11" maxlength="11"><br>

            <label for="supp_add">Address:</label>
            <input type="text" name="supp_add" maxlength="254"><br>

            <fieldset>
                <label>Actions</label>
                <button type="submit" name="display">Display</button>
                <input type="submit" name="insert" value="Insert">
                <input type="submit" name="delete" value="Delete" onclick="prepareDelete()">
                <input type="submit" name="update" value="Update"><br>
            </fieldset>
        </form>
    </fieldset>
</body>
</html>
