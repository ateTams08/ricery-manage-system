<!DOCTYPE html>
<html>
<head>
    <!--CSS LINK-->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
   <div class="logo-container">
        <img src="../../assets/logo1.png" alt="Logo" style="width:120px;height:100px;">
        <h2>Database System</h2>
    </div>
    
    <div class="topnav">
        <a href="../index.html">Home</a>
        <a id="productID" href="product.html">Product Inventory</a>
        <a id="prodempID" href="product-employee.html">Assignments</a>
        <a class="active" id="transactionID" href="transaction.html">Transactions</a>
        <a id="customerID" href="customer.html">Customer</a>

        <a id="empID" href="employee.html">Employee</a>
        <a id="suppID" href="supplier.html">Supplier</a>
        
        <a href="../login.html" id="logoutButton" style="float: right;">Log Out</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userRole = localStorage.getItem('userRole');
            const employeeLink = document.getElementById('employeeLink');
            const logoutButton = document.getElementById('logoutButton');

            // RESTRICTION VIEWS
            if (userRole === 'admin') {
                // Admin sees all links
                employeeLink.style.display = 'block';

            } else if (userRole === 'employee') {
                // Hide the Employee and Supplier links
                empID.style.display = 'none';
                prodempID.style.display ='none';
                suppID.style.display = 'none';

            } else {
                alert('Session expired or unauthorized access. Please log in.');
                window.location.href = 'login.html'; 
                return; 
            }
        });
    </script>

    <br>

    <!--PAYMENT-->
    <h4>Payment</h4>
    <fieldset>
        <form action="/Ricery/backend/modules/payment.php" method="POST">
            <!--INSERT VALUES-->
            <label for="pay_refid"> Reference ID: </label>
            <input type="text" name="pay_refid" maxlength="50"><br> 

            <label for="pay_mode"> Mode of Payment: </label>
            <select name="pay_mode">
                <option value="CASH">CASH</option>
                <option value="CARD">CARD</option>
                <option value="E-WALLET">E-WALLET</option>
            </select><br>

            <label for="pay_amt"> Final Amount: </label>
            <input type="number" name="pay_amt" min="0.00" max="9999999.99" step="0.01"><br>

            <fieldset>
                <label> Actions </label>
                <a href="/Ricery/backend/modules/payment.php">
                    <button>Display</button>
                </a>
                <!--INSERT BUTTON-->
                <input type="submit" name="insert" value="Insert">
                <!--DELETE BUTTON-->
                <input type="submit" name="delete" value="Delete">
                <!--UPDATE BUTTON-->
                <input type="submit" name="update" value="Update"><br>
            </fieldset>

        </form>
    </fieldset>

    <!--PURCHASE-->
    <h4>Purchase</h4>
    <fieldset>
        <form action="/Ricery/backend/modules/purchase.php" method="POST">
            <!--INSERT VALUES-->
            <label for="purch_id"> Purchase ID: </label>
            <input type="text" name="purch_id" minlength="6" maxlength="6"pattern="P[A-Z][0-9]{4}"
            title="Format must be P + capital letter + 4 digits (PA0001 - PZ9999).">
            <br>

            <label for="cust_id"> *Customer ID: </label>
            <input type="text" name="cust_id" minlength="5" maxlength="5"
                   pattern="[A-Z]{2}[0-9]{3}"
                   title="Format must be two capital letters followed by three digits (AA001 - ZZ999).">
            <br>

            <label for="pay_refid"> *Payment Reference ID: </label>
            <input type="text" name="pay_refid" maxlength="50"><br> 

            <label for="purch_amt"> Amount: </label>
            <input type="number" name="purch_amt" min="0.00" max="9999999.99" step="0.01"><br> 

            <label for="purch_date"> Date of Purchase: </label>
            <input type="datetime-local" name="purch_date"><br> 

            <fieldset>
                <label> Actions </label>
                <a href="/Ricery/backend/modules/purchase.php">
                    <button>Display</button>
                </a>
                <!--INSERT BUTTON-->
                <input type="submit" name="insert" value="Insert">
                <!--DELETE BUTTON-->
                <input type="submit" name="delete" value="Delete">
                <!--UPDATE BUTTON-->
                <input type="submit" name="update" value="Update"><br>
            </fieldset>

        </form>
    </fieldset>

    <!--PURCHASE-PRODUCT-->
    <h4>Purchase-Product</h4>
    <fieldset>
        <form action="/Ricery/backend/modules/purchase-product.php" method="POST">
            <!--INSERT VALUES-->
            <label for="purch_id"> *Purchase ID: </label>
            <input type="text" name="purch_id" minlength="6" maxlength="6"pattern="P[A-Z][0-9]{4}"
            title="Format must be P + capital letter + 4 digits (PA0001 - PZ9999).">
            <br>

            <label for="prod_id"> *Product ID: </label>
            <input type="text" name="prod_id" minlength="4" maxlength="4"
                   pattern="R[A-Z][0-9]{2}"
                   title="Format must be R + capital letter + two digits (RA01 - RZ99).">
            <br>

            <label for="pur_pro_quant"> Quantity: </label>
            <input type="number" name="pur_pro_quant" min="0" step="1"><br>

            <label for="pur_pro_weight"> Weight: </label>
            <input type="number" name="pur_pro_weight" min="0.00" max="999.99" step="0.01"><br> 

            <label for="pur_pro_uprice"> Unit Price: </label>
            <input type="number" name="pur_pro_uprice" min="0.00" max="9999999.99" step="0.01"><br> 

            <fieldset>
                <label> Actions </label>
                <a href="/Ricery/backend/modules/purchase-product.php">
                    <button>Display</button>
                </a>
                <!--INSERT BUTTON-->
                <input type="submit" name="insert" value="Insert">
                <!--DELETE BUTTON-->
                <input type="submit" name="delete" value="Delete">
                <!--UPDATE BUTTON-->    
                <input type="submit" name="update" value="Update"><br>
            </fieldset>

        </form>
    </fieldset>
</body>
</html>
