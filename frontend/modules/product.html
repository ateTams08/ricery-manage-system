<!DOCTYPE html>
<html>
<head>
    <!--CSS LINK-->
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="logo-container">
        <img src="../../assets/logo1.png" alt="Logo" style="width:120px;height:100px;">
        <h2>Database System</h2>
    </div>
    
    <div class="topnav">
        <a href="../index.html">Home</a>
        <a class="active" id="productID" href="product.html">Product Inventory</a>
        <a id="prodempID" href="product-employee.html">Assignments</a>
        <a id="transactionID" href="transaction.html">Transactions</a>
        <a id="customerID" href="customer.html">Customer</a>

        <a id="empID" href="employee.html">Employee</a>
        <a id="suppID" href="supplier.html">Supplier</a>
        
        <a href="../login.html" id="logoutButton" style="float: right;">Log Out</a>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userRole = localStorage.getItem('userRole');
            const employeeLink = document.getElementById('employeeLink');
            const logoutButton = document.getElementById('logoutButton');

            // RESTRICTION VIEWS
            if (userRole === 'admin') {
                // Admin sees all links
                employeeLink.style.display = 'block';

            } else if (userRole === 'employee') {
                // Hide the Employee and Supplier links
                empID.style.display = 'none';
                prodempID.style.display ='none';
                suppID.style.display = 'none';

            } else {
                alert('Session expired or unauthorized access. Please log in.');
                window.location.href = 'login.html'; 
                return; 
            }
        });
    </script>
    
    <br>
    
    <!--INSERTION FIELD-->
    <h4>Product</h4>
    <fieldset>
        <form action="/Ricery/backend/modules/product.php" method="POST">
            <!--INSERT VALUES-->
            <label for="prod_id"> Product ID: </label>
            <input type="text" name="prod_id" minlength="4" maxlength="4"
                   pattern="R[A-Z][0-9]{2}"
                   title="Format must be R + capital letter + two digits (RA01 - RZ99).">
            <br>

            <label for="prod_brand"> Product Brand: </label>
            <input type="text" name="prod_brand" maxlength="50" id="prod_brand" pattern="[A-Za-z\s]+" title="Product Brand should only contain letters and spaces."><br>

            <label for="prod_type"> Product Type: </label>
            <input type="text" name="prod_type" maxlength="50" id="prod_type" pattern="[A-Za-z\s]+" title="Product Type should only contain letters and spaces."><br>

            <label for="prod_weight"> Product Weight: </label>
            <input type="number" name="prod_weight" min="0.00" max="999.99" step="0.01"><br>

            <label for="prod_quant"> Product Quantity: </label>
            <input type="number" name="prod_quant"><br>

            <label for="prod_uprice"> Product Unit Price: </label>
            <input type="number" name="prod_uprice" min="0.00" max="9999999.99" step="0.01"><br>

            <fieldset>
                <label> Actions </label>
                <a href="/Ricery/backend/modules/product.php">
                    <button>Display</button>
                </a>
                <!--INSERT BUTTON-->
                <input type="submit" name="insert" value="Insert">
                <!--DELETE BUTTON-->
                <input type="submit" name="delete" value="Delete">
                <!--UPDATE BUTTON-->
                <input type="submit" name="update" value="Update"><br>
            </fieldset>

        </form>
    </fieldset>

    <br>
    <!--BUTTON TO SEE WHOS IN CHARGE OF PRODUCT INVENTORY-->
    <h4>Product-Employee</h4>
    <fieldset>
        <label> Tasks Delegation </label>
            <a href="/Ricery/backend/modules/product-employee.php">
                <button>Display</button>
            </a>
    </fieldset>
</body>
</html>
